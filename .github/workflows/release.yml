name: 发布桌面安装包

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本（x.y.z）
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: 构建 ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS Universal
            os: macos-latest
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
            tauriArgs: --target universal-apple-darwin
          - platform: Windows x64
            os: windows-latest
            rustTargets: x86_64-pc-windows-msvc
            tauriArgs: --target x86_64-pc-windows-msvc

    steps:
      - name: 检出源码
        uses: actions/checkout@v7.0.0

      - name: 配置 Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.4.1
          cache: npm

      - name: 配置 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: 1.95.0
          target: ${{ matrix.rustTargets }}
          cache-workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: npm ci

      - name: 设置发布版本
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: npm run release:prepare -- "$RELEASE_VERSION"

      - name: 构建并发布安装包
        uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Codex NN v__VERSION__
          releaseBody: |
            Codex 暖暖首次公开发布。

            - macOS：Universal DMG，同时支持 Apple Silicon 和 Intel
            - Windows：x64 安装包
            - 应用启动时会自动检查后续更新
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          retryAttempts: 2
          args: ${{ matrix.tauriArgs }}
