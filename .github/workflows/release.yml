name: 发布桌面安装包

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本（x.y.z）
        required: true
        type: string

permissions:
  contents: read

jobs:
  quality-gate:
    name: macOS 质量门禁
    runs-on: macos-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v7.0.0

      - name: 配置 Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.4.1
          cache: npm

      - name: 配置 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: 1.95.0
          components: rustfmt,clippy
          cache-workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: npm ci

      - name: 校验前端构建
        run: npm run build

      - name: 运行前端集成测试与覆盖率门禁
        run: npm run test:coverage

      - name: 校验发布资产
        run: npm run validate:release-assets

      - name: 校验主题引擎脚本语法
        run: node --check src-tauri/resources/theme-engine/renderer-inject.js

      - name: 校验 Rust 格式
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: 运行 Rust Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: 运行 Rust 单元与集成测试
        run: cargo test --manifest-path src-tauri/Cargo.toml

  windows-gate:
    name: Windows 质量门禁
    runs-on: windows-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v7.0.0

      - name: 配置 Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.4.1
          cache: npm

      - name: 配置 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: 1.95.0
          components: clippy
          cache-workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: npm ci

      - name: 校验前端构建与测试
        run: |
          npm run build
          npm test

      - name: 校验发布资产
        run: npm run validate:release-assets

      - name: 运行 Windows Rust Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: 编译 Windows Rust 单元与集成测试
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-run

  release:
    name: 构建 ${{ matrix.platform }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs:
      - quality-gate
      - windows-gate
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS Universal
            os: macos-latest
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
            tauriArgs: --target universal-apple-darwin
          - platform: Windows x64
            os: windows-latest
            rustTargets: x86_64-pc-windows-msvc
            tauriArgs: --target x86_64-pc-windows-msvc

    steps:
      - name: 检出源码
        uses: actions/checkout@v7.0.0

      - name: 配置 Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.4.1
          cache: npm

      - name: 配置 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: 1.95.0
          target: ${{ matrix.rustTargets }}
          cache-workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: npm ci

      - name: 设置发布版本
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: npm run release:prepare -- "$RELEASE_VERSION"

      - name: 构建并发布安装包
        uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Codex NN v__VERSION__
          releaseBody: |
            Codex 暖暖主题引擎与内置主题更新。

            - 原生兼容 Codex Dream Skin 1.2.0 主题格式与渲染语义
            - 新任务页支持整窗主题背景，完整呈现主题概念图
            - 内置云海远行、初音未来、星莓绮梦、苍蓝矩阵、瑞克与莫蒂五套主题
            - 优化行动卡图标、侧栏装饰与文字可读性
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          retryAttempts: 2
          args: ${{ matrix.tauriArgs }}
