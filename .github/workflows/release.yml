name: 发布桌面安装包

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    name: macOS 质量门禁
    runs-on: macos-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v7.0.0

      - name: 配置 Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.4.1
          cache: npm

      - name: 配置 Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: 3.12.8

      - name: 配置 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: 1.95.0
          components: rustfmt,clippy
          cache-workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: npm ci

      - name: 校验前端构建
        run: npm run build

      - name: 运行前端集成测试与覆盖率门禁
        run: npm run test:coverage

      - name: 运行 Skill 打包器测试
        run: python -m unittest discover -s tests/python -v

      - name: 校验发布资产
        run: python scripts/validate-release-assets.py

      - name: 校验主题引擎脚本语法
        run: node --check src-tauri/resources/theme-engine/renderer-inject.js

      - name: 校验 Rust 格式
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: 运行 Rust Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: 运行 Rust 单元与集成测试
        run: cargo test --manifest-path src-tauri/Cargo.toml

  windows-gate:
    name: Windows 质量门禁
    runs-on: windows-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v7.0.0

      - name: 配置 Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.4.1
          cache: npm

      - name: 配置 Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: 3.12.8

      - name: 配置 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: 1.95.0
          components: clippy
          cache-workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: npm ci

      - name: 校验前端构建与测试
        run: |
          npm run build
          npm test

      - name: 校验 Python 与发布资产
        run: |
          python -m unittest discover -s tests/python -v
          python scripts/validate-release-assets.py

      - name: 运行 Windows Rust Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: 运行 Windows Rust 单元与集成测试
        run: cargo test --manifest-path src-tauri/Cargo.toml

  release:
    name: 构建 ${{ matrix.platform }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs:
      - quality-gate
      - windows-gate
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS Universal
            os: macos-latest
            rustTargets: aarch64-apple-darwin,x86_64-apple-darwin
            tauriArgs: --target universal-apple-darwin
          - platform: Windows x64
            os: windows-latest
            rustTargets: x86_64-pc-windows-msvc
            tauriArgs: --target x86_64-pc-windows-msvc

    steps:
      - name: 检出源码
        uses: actions/checkout@v7.0.0

      - name: 配置 Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.4.1
          cache: npm

      - name: 配置 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: 1.95.0
          target: ${{ matrix.rustTargets }}
          cache-workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: npm ci

      - name: 构建并发布安装包
        uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Codex NN v__VERSION__
          releaseBody: |
            Codex 暖暖首次公开发布。

            - macOS：Universal DMG，同时支持 Apple Silicon 和 Intel
            - Windows：x64 安装包
            - 应用启动时会自动检查后续更新
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          retryAttempts: 2
          args: ${{ matrix.tauriArgs }}
